<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wealth Calculator</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>💰 Wealth Calculator</h1>
        <form action="/calculate" method="POST">
            <label>Monthly Income:</label>
            <input type="number" name="income" required>

            <label>Monthly Expenses:</label>
            <input type="number" name="expenses" required>

            <label>Savings:</label>
            <input type="number" name="savings" required>

            <label>Investments:</label>
            <input type="number" name="investments" required>

            <button type="submit">Calculate Wealth</button>
        </form>

        <div class="result">
            <h2>
                <!-- Thymeleaf will inject result -->
                <span th:if="${result != null}">
                    Your Net Wealth: ₹<span th:text="${result}"></span>
                </span>
            </h2>
        </div>
    </div>
</body>
</html>
